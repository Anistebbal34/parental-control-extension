<!DOCTYPE html>
<html>

<head>
    <title>Browser Locked</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 120px;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            margin: 0 0 20px 0;
            font-size: 48px;
            font-weight: 700;
        }

        .message {
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .time-info {
            font-size: 16px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin-top: 30px;
        }

        #countdown {
            font-size: 32px;
            font-weight: 700;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="icon" id="icon">🔒</div>
        <h1 id="title">Browser Locked</h1>
        <div class="message" id="message"> This browser is currently locked based on your schedule. </div>
        <div class="time-info">
            <div>Current Time: <strong id="current-time">--:--</strong></div>
            <div id="countdown"></div>
        </div>
    </div>
    <script> // Get reason from URL const params = new URLSearchParams(window.location.search); const reason = params.get('reason'); if (reason === 'whitelist') { document.getElementById('icon').textContent = '📝'; document.getElementById('title').textContent = 'Whitelist Mode Active'; document.getElementById('message').textContent = 'Only whitelisted websites are accessible in this mode.'; } // Update current time function updateTime() { const now = new Date(); const timeStr = now.toLocaleTimeString(); document.getElementById('current-time').textContent = timeStr; } setInterval(updateTime, 1000); updateTime(); // TODO: Calculate and show countdown to unlock time </script>
</body>

</html>
